<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Surat Untuk Kamu</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#ffccd5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
background:white;
border-radius:20px;
padding:30px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#ff3366;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#ff3366;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#text{
margin-top:20px;
min-height:80px;
font-size:18px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">
<h1>Surat dari Syahid</h1>

<div id="text"></div>

<button onclick="next()">Lanjut</button>
</div>

<audio id="music" loop preload="auto">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9cce9b9f3c.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("music");
audio.volume = 0.7;

let cerita=[
"Hai Ibrahim...",
"Ini adalah pesan kecil dari abang Syahid.",
"Makasih sudah jadi saudara yang baik.",
"Walaupun kadang kita bercanda dan bertengkar.",
"Abang tetap senang punya saudara seperti kamu.",
"Semoga kita selalu saling ingat.",
"Dan jangan pernah lupa abang ya."
];

let i=0;

function typeWriter(text,element){
let index=0;
element.innerHTML="";
function typing(){
if(index<text.length){
element.innerHTML+=text.charAt(index);
index++;
setTimeout(typing,40);
}
}
typing();
}

function next(){

if(audio.paused){
audio.play();
}

if(i<cerita.length){
typeWriter(cerita[i],document.getElementById("text"));
i++;
}else{
document.getElementById("text").innerHTML="Terima kasih sudah membaca ❤️";
}

}

next();

</script>

</body>
</html>
